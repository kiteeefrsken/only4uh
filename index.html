<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For Ayesha</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

#box{
    width:80%;
    max-width:700px;
}

button{
    padding:10px 20px;
    margin:8px;
    font-size:16px;
    cursor:pointer;
}

input{
    padding:10px;
    font-size:16px;
    width:250px;
}

#text{
    font-size:28px;
    line-height:1.5;
}
</style>
</head>

<body>

<div id="box">

<div id="text">
Did you come from Kite's YouTube link?
</div>

<div id="buttons">
<button onclick="startAnswer('yes')">Yes</button>
<button onclick="startAnswer('no')">No</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDp5golTLq7SofX0xMkVqdCxSvnpYOJbug",
  authDomain: "only4uh.firebaseapp.com",
  projectId: "only4uh",
  storageBucket: "only4uh.firebasestorage.app",
  messagingSenderId: "898964000205",
  appId: "1:898964000205:web:1c7a5d1e7ba81c0aeb8884",
  measurementId: "G-6MZJ6T5HTG"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

    alert("Firebase connected");
window.startAnswer = function(answer){

    if(answer === "no"){
        document.getElementById("text").innerHTML = "Access denied.";
        document.getElementById("buttons").innerHTML = "";
        return;
    }

    document.getElementById("text").innerHTML =
    "What is your name?<br><small>It will only work for the right person.</small>";

    document.getElementById("buttons").innerHTML = `
        <input id="nameInput" placeholder="Enter your name">
        <br><br>
        <button onclick="checkName()">Submit</button>
    `;
}

window.checkName = async function(){


    let name = document.getElementById("nameInput")
        .value
        .trim()
        .toLowerCase();
try {
    await addDoc(collection(db, "visits"), {
        name: name,
        timestamp: new Date().toISOString()
    });
} catch (error) {
    console.log(error);
}
    if(name !== "ayesha"){
        document.getElementById("text").innerHTML = "Wrong person.";
        document.getElementById("buttons").innerHTML = "";
        return;
    }

    document.getElementById("text").innerHTML =
    "Are you mad at me?";

    document.getElementById("buttons").innerHTML = `
        <button onclick="madAnswer('yes')">Yes</button>
        <button onclick="madAnswer('no')">No</button>
    `;
}

window.madAnswer = function(answer){

    if(answer === "yes"){

        document.getElementById("text").innerHTML =
        "Sorry... I wanted to tell you something.";

        document.getElementById("buttons").innerHTML = `
            <button onclick="finalTyping()">Okayyy</button>
            <button onclick="dontWannaHear()">Don't wanna hear</button>
        `;

    } else {

        document.getElementById("text").innerHTML =
        "Okay okay good.<br><br>Wanna hear something?";

        document.getElementById("buttons").innerHTML = `
            <button onclick="finalTyping()">Okayyy</button>
            <button onclick="dontWannaHear()">Don't wanna hear</button>
        `;
    }
}

window.dontWannaHear = function(){

    document.getElementById("text").innerHTML = "plzz";

    document.getElementById("buttons").innerHTML = `
        <button onclick="finalTyping()">Okayyy</button>
        <button onclick="dontWannaHear()">Nooo</button>
    `;
}

window.finalTyping = function(){

    document.getElementById("buttons").innerHTML = "";

    let text = document.getElementById("text");

    text.innerHTML = "";

    let message =
    "bishhh i love u can't you understand this";

    let i = 0;

    let typing = setInterval(() => {

        text.innerHTML =
        message.substring(0, i + 1);

        i++;

        if(i >= message.length){
            clearInterval(typing);
        }

    }, 120);
}

</script>

</body>
</html>
